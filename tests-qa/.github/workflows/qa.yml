name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  playwright:
    name: Playwright
    if: vars.BASE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - name: Install browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          CI: "1"
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    name: Lighthouse CI
    if: vars.BASE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - name: Discover URLs from sitemap.xml
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          LHCI_URLS: ${{ vars.LHCI_URLS }}
        run: node scripts/lhci-discover.mjs
      - name: Run Lighthouse
        run: npx --yes @lhci/cli@0.14.x autorun
